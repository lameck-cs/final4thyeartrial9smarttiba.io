<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Tiba Kenya</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <header>
        <img src="logo.png" alt="Smart Tiba Kenya Logo" id="logo">
        <h1>Smart Tiba Kenya</h1>
    </header>
    
    <nav id="mainNav">
        <a href="register.html" style="margin-left: auto;">Register for Access</a>
    </nav>
    
    <div class="container" style="justify-content: center; margin-top: 50px;">
        <div class="left-column" style="max-width: 450px; width: 100%; box-sizing: border-box;">
            <h2 style="color: #1b5e20; text-align: center; margin-bottom: 20px;">Secure Login</h2>
            <div id="loginError" style="color: #c62828; text-align: center; margin-bottom: 15px; font-weight: bold;"></div>
            
            <form id="loginForm">
                <label style="display:block; margin-bottom:5px;"><strong>Email Address:</strong></label>
                <input type="email" id="email" required placeholder="you@example.com">
                
                <label style="display:block; margin-top: 10px; margin-bottom:5px;"><strong>Password:</strong></label>
                <input type="password" id="password" required placeholder="••••••••">
                
                <button type="submit" style="width: 100%; margin-top: 25px; font-size: 1.1em;">Login to Portal 🌿</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">Don't have an account? <a href="register.html" style="color: #2e7d32; font-weight: bold;">Register here</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if(res.ok) window.location.href = 'index.html'; // Directs to home once authenticated
            else document.getElementById('loginError').innerText = data.error;
        });
    </script>
</body>
</html>
